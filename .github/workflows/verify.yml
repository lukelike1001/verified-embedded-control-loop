name: CBMC Verification

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  cbmc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CBMC
        run: |
          sudo apt-get update
          sudo apt-get install -y cbmc

      - name: Run CBMC harnesses
        run: |
          chmod +x run_cbmc.sh
          run_cbmc.sh
